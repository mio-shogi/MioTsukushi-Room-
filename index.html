<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Mio Tsukushi Room</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #000; }
        .full-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: fill; }
        #login-overlay {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 10; text-align: center; background: rgba(255, 255, 255, 0.3);
            padding: 10px 20px; border-radius: 50px; backdrop-filter: blur(8px);
        }
        input { border: none; padding: 8px 15px; border-radius: 20px; outline: none; }
        button { background: #444; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>
    <img src="img/MioTsukushi-Room.png" class="full-screen">
    <div id="login-overlay">
        <input type="text" id="pass-input" placeholder="合言葉">
        <button type="button" onclick="checkPass()">開錠</button>
    </div>
    <script>
        function checkPass() {
            var pass = document.getElementById('pass-input').value;
            if (pass === "enjoi") { window.location.href = "lobby.html"; } 
            else { alert("合言葉が違います。"); }
        }
    </script>
</body>
</html>
