<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>澪の将棋対局室 - 最終開通版</title>
    <script src="https://js.pusher.com/8.4.0/pusher.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f1ea; display: flex; flex-direction: column; align-items: center; font-family: "Sawarabi Mincho", serif; color: #5d4037; padding: 10px; margin: 0; }
        .master-wrapper { display: flex; align-items: flex-start; gap: 30px; margin-top: 10px; }
        #game-view { display: flex; align-items: flex-start; gap: 15px; transition: transform 0.6s ease-in-out; }
        .rotated { transform: rotate(180deg); }
        .rotated .timer-box, .rotated .komadai-label, .rotated .captured-count { transform: rotate(180deg); }
        .side-area { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .timer-box { background: #5d4037; color: #fff; padding: 5px 10px; border-radius: 5px; text-align: center; width: 110px; }
        .timer-box.active { background: #e67e22; border: 2px solid #fff; }
        .time-display { font-size: 20px; font-weight: bold; }
        .komadai { width: 110px; height: 420px; background-color: #edc9af; border: 3px solid #5d4037; padding: 10px; display: flex; flex-direction: column; gap: 10px; box-sizing: border-box; }
        .komadai-label { font-size: 13px; font-weight: bold; background: #5d4037; color: #fff; width: 100%; text-align: center; padding: 2px 0; }
        #board { display: grid; grid-template-columns: repeat(9, 45px); grid-template-rows: repeat(9, 50px); background-color: #edc9af; border: 3px solid #5d4037; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .cell { width: 45px; height: 50px; border: 0.5px solid #5d4037; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; user-select: none; }
        .cell.selected { background-color: rgba(255, 255, 0, 0.4); }
        .piece { display: inline-block; transition: transform 0.3s; color: #000; }
        .captured-piece-wrapper { display: flex; align-items: center; gap: 5px; cursor: pointer; padding: 2px; border-radius: 3px; }
        .captured-piece-wrapper.selected { background: rgba(255, 255, 0, 0.5); border: 1px solid #5d4037; }
        .captured-count { font-size: 14px; font-weight: bold; background: #fff; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border: 1px solid #5d4037; }
        #chat-area { width: 220px; height: 530px; background: #fff; border: 2px solid #5d4037; display: flex; flex-direction: column; border-radius: 5px; }
        #chat-log { flex-grow: 1; overflow-y: auto; padding: 10px; font-size: 13px; border-bottom: 1px solid #ddd; }
        #chat-input-container { display: flex; padding: 5px; }
        #chat-input { flex-grow: 1; border: 1px solid #ccc; padding: 5px; }
        #chat-send { background: #5d4037; color: #fff; border: none; padding: 5px 10px; cursor: pointer; }
        .controls { margin-bottom: 10px; }
        button.action-btn { background: #5d4037; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-family: inherit; font-weight: bold; }
    </style>
</head>
<body>
    <h1>澪の将棋対局室</h1>
    <div class="controls"><button class="action-btn" onclick="toggleRotate()">視点切替</button></div>
    <div class="master-wrapper">
        <div id="game-view">
            <div class="side-area">
                <div id="box-gote" class="timer-box"><div>後手</div><div id="timer-gote" class="time-display">10:00</div></div>
                <div class="komadai-label">後手 駒台</div>
                <div id="komadai-gote" class="komadai"></div>
            </div>
            <div id="board"></div>
            <div class="side-area">
                <div id="box-sente" class="timer-box active"><div>先手</div><div id="timer-sente" class="time-display">10:00</div></div>
                <div class="komadai-label">先手 駒台</div>
                <div id="komadai-sente" class="komadai"></div>
            </div>
        </div>
        <div id="chat-area"><div id="chat-log"></div><div id="chat-input-container"><input type="text" id="chat-input" placeholder="メッセージ..."><button id="chat-send" onclick="sendChat()">送</button></div></div>
    </div>
    <script>
        const pusher = new Pusher('95818961727725969640', { cluster: 'ap3' }); 
        const channel = pusher.subscribe('mio-shogi-room');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let times = { sente: 600, gote: 600 }; let turn = 'sente'; let isRotated = false;
        let boardState = [['L','N','S','G','K','G','S','N','L'],['','R','','','','','','B',''],['P','P','P','P','P','P','P','P','P'],['','','','','','','','',''],['','','','','','','','',''],['','','','','','','','',''],['p','p','p','p','p','p','p','p','p'],['','b','','','','','','r',''],['l','n','s','g','k','g','s','n','l']];
        let capturedSente = {}, capturedGote = {}; let selected = null;
        const pieceNames = { 'p':'歩','r':'飛','b':'角','g':'金','s':'銀','n':'桂','l':'香','k':'玉','P':'歩','R':'飛','B':'角','G':'金','S':'銀','N':'桂','L':'香','K':'玉','p+':'と','r+':'龍','b+':'馬','s+':'全','n+':'圭','l+':'杏','P+':'と','R+':'龍','B+':'馬','S+':'全','N+':'圭','L+':'杏'};
        setInterval(() => { if (times[turn] > 0) { times[turn]--; updateTimerDisplay(); } }, 1000);
        function updateTimerDisplay() {
            ['sente', 'gote'].forEach(t => {
                document.getElementById(`timer-${t}`).textContent = `${String(Math.floor(times[t] / 60)).padStart(2, '0')}:${String(times[t] % 60).padStart(2, '0')}`;
                document.getElementById(`box-${t}`).classList.toggle('active', turn === t);
            });
        }
        function draw() {
            const b = document.getElementById('board'); b.innerHTML = '';
            for(let r=0; r<9; r++) {
                for(let c=0; c<9; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell' + (selected && selected.type==='board' && selected.r===r && selected.c===c ? ' selected' : '');
                    const p = boardState[r][c];
                    if(p) {
                        const span = document.createElement('span');
                        const isSente = p === p.toLowerCase();
                        span.className = 'piece ' + (isSente ? 'sente' : 'gote');
                        let rotateVal = (isSente ? (isRotated ? 180 : 0) : (isRotated ? 0 : 180));
                        span.style.transform = `rotate(${rotateVal}deg)`;
                        span.textContent = pieceNames[p] || p;
                        cell.appendChild(span);
                    }
                    cell.onclick = () => { if (audioCtx.state === 'suspended') audioCtx.resume(); handleClick(r, c); };
                    b.appendChild(cell);
                }
            }
            updateKomadai('sente', capturedSente);
            updateKomadai('gote', capturedGote);
        }
        function updateKomadai(owner, captured) {
            const container = document.getElementById(`komadai-${owner}`);
            container.innerHTML = '';
            Object.keys(captured).sort().forEach(p => {
                if(captured[p] <= 0) return;
                const wrapper = document.createElement('div');
                wrapper.className = 'captured-piece-wrapper' + (selected && selected.type==='komadai' && selected.piece===p ? ' selected' : '');
                const span = document.createElement('span');
                const isSente = owner === 'sente';
                span.className = 'piece ' + owner;
                let rotateVal = (isSente ? (isRotated ? 180 : 0) : (isRotated ? 0 : 180));
                span.style.transform = `rotate(${rotateVal}deg)`;
                span.textContent = pieceNames[p];
                wrapper.appendChild(span);
                if(captured[p] > 1) {
                    const count = document.createElement('span');
                    count.className = 'captured-count';
                    count.textContent = captured[p];
                    wrapper.appendChild(count);
                }
                wrapper.onclick = (e) => { e.stopPropagation(); selectFromKomadai(p, owner); };
                container.appendChild(wrapper);
            });
        }
        function selectFromKomadai(piece, owner) {
            if(turn !== owner) return;
            selected = { type: 'komadai', piece, owner };
            draw();
        }
        function handleClick(r, c) {
            const target = boardState[r][c];
            if(selected && selected.type === 'komadai') {
                if(!target) {
                    boardState[r][c] = selected.owner === 'sente' ? selected.piece.toLowerCase() : selected.piece.toUpperCase();
                    if(selected.owner === 'sente') capturedSente[selected.piece]--;
                    else capturedGote[selected.piece]--;
                    finishTurn();
                } else { selected = null; }
                draw(); return;
            }
            if(!selected || selected.type !== 'board') {
                if(target) {
                    const isSentePiece = target === target.toLowerCase();
                    if((turn === 'sente' && isSentePiece) || (turn === 'gote' && !isSentePiece)) {
                        selected = { type: 'board', r, c };
                    }
                }
            } else {
                const piece = boardState[selected.r][selected.c];
                if (selected.r === r && selected.c === c) { selected = null; draw(); return; }
                if(target) {
                    const isSente = piece === piece.toLowerCase();
                    const isTargetSente = target === target.toLowerCase();
                    if(isSente !== isTargetSente) {
                        let cap = target.replace('+', '').toLowerCase();
                        if(isSente) capturedSente[cap] = (capturedSente[cap] || 0) + 1;
                        else capturedGote[cap.toUpperCase()] = (capturedGote[cap.toUpperCase()] || 0) + 1;
                    } else { selected = { type: 'board', r, c }; draw(); return; }
                }
                const fromR = selected.r;
                boardState[r][c] = piece;
                boardState[fromR][selected.c] = '';
                const pType = piece.toLowerCase();
                if (['p','r','b','s','n','l'].includes(pType) && !piece.includes('+')) {
                    const isIntoZone = (piece === piece.toLowerCase() && r <= 2) || (piece === piece.toUpperCase() && r >= 6);
                    const isFromZone = (piece === piece.toLowerCase() && fromR <= 2) || (piece === piece.toUpperCase() && fromR >= 6);
                    if (isIntoZone || isFromZone) { if(confirm("成りますか？")) boardState[r][c] += '+'; }
                }
                finishTurn();
            }
            draw();
        }
        function finishTurn() {
            turn = (turn === 'sente') ? 'gote' : 'sente';
            selected = null;
            draw();
            syncBoard();
        }
        function syncBoard() {
            fetch('/.netlify/functions/send-move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ board: boardState, capSente: capturedSente, capGote: capturedGote, nextTurn: turn, remTimes: times })
            }).catch(err => console.error(err));
        }
        channel.bind('move-event', function(data) {
            boardState = data.board; capturedSente = data.capSente; capturedGote = data.capGote; turn = data.nextTurn; times = data.remTimes; draw(); updateTimerDisplay();
        });
        function toggleRotate() { isRotated = !isRotated; document.getElementById('game-view').classList.toggle('rotated'); draw(); }
        function sendChat() {
            const input = document.getElementById('chat-input');
            if(input.value) {
                fetch('/.netlify/functions/send-chat', { method: 'POST', body: JSON.stringify({ message: input.value }) });
                input.value = '';
            }
        }
        channel.bind('chat-event', function(data) {
            const log = document.getElementById('chat-log');
            const div = document.createElement('div');
            div.style.marginBottom = "5px";
            div.innerHTML = `<strong>対局者:</strong> ${data.message}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        });
        draw();
    </script>
</body>
</html>
